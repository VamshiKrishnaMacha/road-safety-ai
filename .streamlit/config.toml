[theme]
base = "dark"
primaryColor = "#00d4aa"
backgroundColor = "#0a0e17"
secondaryBackgroundColor = "#0f1629"
textColor = "#e2e8f0"
font = "sans serif"

[server]
headless = true
collectUsageMetrics = false
port = 8501
enableCORS = false
enableXsrfProtection = true
maxUploadSize = 200

[browser]
gatherUsageStats = false

[logger]
level = "warning"

[runner]
fastReruns = true
